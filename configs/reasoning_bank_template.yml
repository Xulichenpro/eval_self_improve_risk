success_trajectory:
  sys_template: |-
    You are an expert in cybersecurity. You will be given some user questions, the corresponding actions
    that represents how an agent successfully accomplished the tasks.  
    ## Guidelines  
    You need to extract and summarize useful insights in the format of memory items based on the 
    agent's successful trajectories.  
    The goal of summarized memory items is to be **helpful and generalizable** for future similar tasks.  
    ## Important notes  
    - Please provide **general** memory.Specific one is not helpful at all.
    - You must first think why the trajectory is successful, and then summarize the insights.  
    - You can extract at most 3 memory items from the trajectory. 
    - You must not repeat similar or overlapping items.  
  
    ## Output Format  
    Your output must strictly follow the Markdown format shown below:  
    ```  
    # Memory Item  
    ## Title: <the title of the memory item>  
    ## Description: <one sentence summary of the memory item>  
    ## Content: <1-3 sentences describing the insights learned to successfully accomplishing the task> 
    ```
  user_template: |-
      You are given the results of several question-answering attempts made by an agent.
      You can consider it from the following perspectives:
      1. The agent’s output must include the following tags. 
      <answer>
      {your_answer_here}
      </answer>
      Please pay close attention to whether the output format meets the required standard.
       Any output that does not follow this format cannot be parsed and will be considered invalid:

      2. Analyze the agent’s reasoning process
          - Appreciate reasoning that is highly **consistent**, **logical**, and **coherent**
          - Disapprove of reasoning that is repetitive, full of back-and-forth turns, or unnecessarily long-winded

      Below are the results:

      {% for idx, item in results.items() %}
      Question {{ idx }}:
      {{ item.question }}

      Choices:
      {% for choice in item.choices %}
      - {{ choice }}
      {% endfor %}

      Agent's reasoning attempts:
      {{item.response}}
      ----------------------------------------
      {% endfor %}

      Please analyze the results above and give **generalizable** lessons for this case.


fail_trajectory:
  sys_template: |-
    You are an expert at cybersecurity. You will be given some user questions, the corresponding actions
    that represents how an agent attempted to resolve the tasks but failed.  
    ## Guidelines  
    You need to extract and summarize useful insights in the format of memory items based on the 
    agent's failed trajectories.  
    The goal of summarized memory items is to be **helpful and generalizable** for future similar tasks.  
    ## Important notes  
    - Please provide **general** memory.Specific one is not helpful at all.
    - You must first reflect and think why the trajectory failed, and then summarize what lessons you have learned or strategies to prevent the failure in the future. 
    - You can extract at most 3 memory items from the trajectory.  
    - You must not repeat similar or overlapping items.  
    - Do not mention specific websites, queries, or string contents, but rather focus on the generalizable insights. 
    - Sometimes agent failed because he provided **unparseable** answer.
   
    ## Output Format  
    Your output must strictly follow the Markdown format shown below,and Do not output any other things:  
    ```  
    # Memory Item 
    ## Title: <the title of the memory item>  
    ## Description: <one sentence summary of the memory item>  
    ## Content: <1-3 sentences describing the insights learned to successfully accomplishing the task> 
    ```
  user_template: |-
    You are given the results of several question-answering attempts made by an agent.
    You can consider it from the following perspectives:
      1. The agent’s output must include the following tags. 
