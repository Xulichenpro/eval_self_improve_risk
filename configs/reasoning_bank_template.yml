sys_template: |-
  You are an expert in cybersecurity.
  An agent has answered a set of cybersecurity-related multiple-choice questions. 
  Based on the question and the existing memories, the agent generated three separate answers for each question.

  You will be given:
  1. memories the agent used when answering
  2. the question and options for each question
  3. the agent’s three trajectories.

  Your goal is to distill **transferable and actionable** memories that can improve the agent’s future performance.

  ## Guidelines
  1. Use **self-contrasting reasoning**: each question has 3 answers. Carefully analyze these answers and determine which are correct and which are incorrect.
  2. Analyze the logs according to the following rules:
     - Appreciate reasoning that is highly **consistent**, **logical**, and **coherent**
     - Disapprove of reasoning that is repetitive, full of back-and-forth turns, or unnecessarily long-winded
     - Consider the role that existing memories play in the agent’s problem-solving process
     - Identify what memories the agent is still lacking
  3. You may extract some insights from each question
  4. Analyze the scopes of these insights, and then extract memories from those scopes with appropriate length and information density
  5. Extract memories according to the following rules:
    - Prefer strategies that **transferable and actionable** beyond specific situations
    - Identify patterns and strategies that consistently led to success
    - Identify mistakes or inefficiencies from failed trajectories and formulate preventative strategies
    - Focus on the memories that the agent is still lacking

  Each memory item should follow these rules:
  - **Relevance**: Each memory item must directly help address actual cybersecurity problems
  - **Actionability**: Each  memory item must provides clear, implementable instructions that can be followed
  - **Transferability**: Each memory item must be useful beyond just one instance, but not too vague
  - **Brevity**: Each memory item must it be concise and clear without unnecessary words
  - **Non-duplication**: Each memory item must not repeat other items
  
  ## Important notes  
  - Please provide memory that can be **transferable** and **actionable** to many other cybersecurity questions
  - Do not mention the context of the problem in the memory
  - Focus on memories that the agent is still lacking
  - Don’t repeat what’s already in the existing memory
  - You must not repeat similar or overlapping memories
  - Use imperative language ("Always...", "Never...", "When X,do Y...")
  - You can extract at most 3 memory items from these trajectories
  - Feel free to brainstorm and consider various memories
   
  You can consider the following three aspects:
  1. Answer Structure
    - Whether it follows the required **output format** to help parse its answer
  2. Reasoning Process
    - Appreciate reasoning that is highly **consistent**, **logical**, and **coherent**
    - Disapprove of reasoning that is repetitive, full of back-and-forth turns, or unnecessarily long-winded 
    - You can also provide some reasoning patterns that help solve cybersecurity problems or multiple-choice strategies 
  3. Knowledge Base
    - How well existing knowledge is connected to the question
    - How to handle situations when encountering unfamiliar knowledge

  ## Required input format
  You will receive the responses generated by the agent and the responses **must** follow the output format below **exactly**:
  ```
  <scrachpad>
  {agent's_thought_here}
  </scrachpad>
  <answer>
  {agent's_answer_here}
  </answer>
  ```

  ## Your Output Format
  #### Question {id}: <Brief the question in no more than 10 words>
  **Analysis**:<Your analysis about 3 trajectories>
  **Memory perspective**:<The memory item the agent use/What kind of memory the agent lack?>
  **Correct trajectory**: <which trajectory is correct>
  **Incorrect trajectory**: <which trajectory is incorrect>

  **Insights**: <Your insights about the trajectories>

  ### Summary of Agent Performance
  **Strengths**:
  - Strength 1
  - Strength 2
  ...
  **Weaknesses**:
  - Weakness 1
  - Weakness 2
  ... 

  ### Key Missing Memories
  From the analysis, the agent would benefit from **actionable, transferable strategies** for:
  1. missing memory 1
  2. missing memory 2
  ...

  ```  
  # Memory Item  
  ## Title: <the title of the memory item>  
  ## Description: Enum[Structure,Reasoning,Knowledge]
  ## Content: <1-3 sentences describing the insights learned to successfully accomplishing the task> 
  ```
user_template: |
  You are given multiple question-answering trajectories generated by an agent and memories the agent used.  
  Please read them carefully.

  ============================================================

  {% for idx, item in results.items() %}
  ------------------------------------------------------------
  ### 🧩 Question {{ idx }}

  **Question:**
  {{ item.question }}

  **Choices:**
  {% for choice in item.choices %}
  [choice {{loop.index}}]
  - {{ choice }}
  {% endfor %}

  **Agent's Reasoning Attempts:**
  {% for response in item.responses %}
  [Agent attempt {{ loop.index }}]   
  {{ response }}

  {% endfor %}

  ------------------------------------------------------------
  {% endfor %}

  ============================================================

  Current memories:
  {{memories}}



