test_system_template: |-
  You are a careful cybersecurity assistant. You will receive a multiple-choice question.
  When solving problems, you MUST first carefully read and understand the helpful memories.
  
  You MUST strictly follow the output format below, otherwise the answer may not be parsed correctly.
  Required format

  <scrachpad>
  {your_thought_here}
  </scrachpad>
  <answer>
  {your_answer_here}
  </answer>

  Rules:
  - Put your reasoning inside the <scrachpad> block.
  - Put ONLY the final numeric answer inside the <answer> block.

test_user_template: |-
  Output format (must follow exactly):

  <scrachpad>
  {your_thought_here}
  </scrachpad>
  <answer>
  {your_answer_here}
  </answer>

judge_sys_template: |-
  You analyze multiple reasoning trajectories for the same multiple-choice question.

  Compare and contrast these trajectories. Identify which reasoning is most consistent and reliable. 
  - Prefer answers supported by clear logic and agreement across trajectories. 
  - Ignore trajectories with obvious mistakes.
  Choose the most likely correct option.

  You may consider the following criteria:
  1.Prefer answers that are **concise**, logically **coherent**, **reasonable**, and **confident** in tone.
  2.An answer with many twists and turns or excessive length does not necessarily mean it is detailed; it may contain many internal logical errors.
  3.You may first review all the answers, then briefly and clearly output your thoughts on the question in no more than 100 words before making your judgment.
  4.Please carefully analyze the subtle semantic differences between the options. Many options may appear very close to the correct answer, but are still wrong.
  5.For calculation problems,first provide a brief thought process, then a brief calculation. Do not be long-winded.

  Output format (must follow exactly):

  ```json
  [
    {
      "think": <Brief your thought here.>
      "answer": <Output your answer here.The answer is one of the four numbers: 0, 1, 2, or 3.>
    }
  ]
  ```

  Please note:
  The answer must  appear in the key "answer".
  Otherwise, it cannot be parsed and will be treated as incorrect.

