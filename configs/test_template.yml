user_template_with_memory: |-
  {% if memory %}
  Below are some memory items that may be helpful to solve the task. 
  You can use it when you feel it is relevant.
  In each step, please discuss if you want to use each memory item or not.
  
  {{memory}}
  {% endif %}
  
choice_prompts: 
  best_of_n: |-
    You are an expert in evaluating cyber security agent trajectories. 
    You will be given a question, and candidate trajectories, each representing a kind of thought and reasoning for solving the same task. 
    Your job is to select the single best trajectory that most effectively and efficiently solves the task.  

    ### Agent Trajectories:
    {% for response in responses %}
    [Trajectory {{ loop.index0 }}]
    {{ response }}
    ---
    {% endfor %}

    ## Evaluation Criteria:  
    1.Pay attention to the efficiency of the reasoning trajectory
      - Prefer trajectories that use concise and rational thinking to successfully arrive at the correct answer.
      - Long and verbose trajectories often contain many internal logical contradictions and are not preferred.
    2.Pay attention to the internal consistency of the trajectory
      - Trajectories that contain many “but” or “wait” reversals should be discarded.
      - The logic must remain clear and coherent throughout.
   
    ### Overall Trajectory Quality 1. Logical flow of reasoning, clarity of strategy, and coherence. 2. Closeness to final 
    answer. 3. Reward consistent progress and coherent reasoning.  
    
    Your response must strictly follow this format:
    <scrachpad>
    {your think here}
    <scrachpad>
    <goodcase>
    {index of the good case}
    </goodcase>


    Note: The index is an integer starting from 0, corresponding to the trajectories listed above.

  two_different_trajs: |-
    You are an expert cybersecurity analyst specialized in evaluating the trajectories of autonomous agents. 
    Below are the execution trajectories generated by an agent attempting to solve a security challenge:

    ### Agent Trajectories:
    {% for response in responses %}
    [Trajectory {{ loop.index0 }}]
    {{ response }}
    ---
    {% endfor %}

    ### Task:
    You must analyze the trajectories provided above. Notice that the answers and logical paths within these trajectories vary. 
    Just before,you have analyze these trajectories and provide a correct answer.

    1. Identify one **goodcase**: A trajectory where the agent demonstrates clear, logical thinking and reaches the correct conclusion.
    2. Identify one **badcase**: A trajectory where the agent fails, provides an incorrect answer(sometimes do not provide parseable answer), or follows a flawed logic path.
    3. The agent output format should be:
    <scrachpad>
    {your_thought_here}
    </scrachpad>
    <answer>
    {your_answer_here}
    </answer>

    Please follow the requirements below:

    1. The problem description and your final answer are in the message history. Please review them first and output the final answer you gave previously.
    2. Select one good case and one bad case.
      - The good case answer must be correct.
      - The bad case answer can be correcy, incorrect or unparsable.
      - The answer provided by the agent must be inside **<answer>...</answer>**.
      - If the correct answer is written elsewhere but not inside the tag, it will be treated as unparsable.
    3.Please note that the agent’s output must include the following format:
    <answer>
    {your_answer_here}
    </answer>
    Otherwise, it cannot be parsed.
    4. A good answer should have coherent logic and clear reasoning.
    5. Poor answers tend to be winding, convoluted, and find it hard to get to the point.
    ### Output Format:
    Your response must strictly follow this format:
    
    <scrachpad>
    {your think here}
    </scrachpad>
    <goodcase>
    {index of the good case}
    </goodcase>

    <badcase>
    {index of the bad case}
    </badcase>

    Note: The index is an integer starting from 0, corresponding to the trajectories listed above.
