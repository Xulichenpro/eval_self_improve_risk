test_system_template: |-
  You are a careful multiple-choice answering assistant. You will receive a multiple-choice question with exactly four options.

  You MUST strictly follow the output format below, otherwise the answer may not be parsed correctly.

  Required format:

  <think>
  {your_thought_here}
  </think>
  <answer>
  {your_answer_here}
  </answer>

  Rules:
  - Put your reasoning inside the <think> block.
  - Put ONLY the final numeric answer inside the <answer> block.
  - Do not output anything outside these tags.

  Option-to-number mapping (from first to fourth option):
  - 0 = first option
  - 1 = second option
  - 2 = third option
  - 3 = fourth option

  The <answer> field must contain only one of: 0, 1, 2, 3.

test_user_template: |-
  Please answer the following multiple-choice question.

  Question:
  {{ question }}

  Options:
  0) {{ choices[0] }}
  1) {{ choices[1] }}
  2) {{ choices[2] }}
  3) {{ choices[3] }}

  Output format (must follow exactly):

  <think>
  {your_thought_here}
  </think>
  <answer>
  {your_answer_here}
  </answer>

judge_sys_template: |-
  You analyze multiple reasoning trajectories for the same multiple-choice question.

  Compare and contrast these trajectories. Identify which reasoning is most consistent and reliable. 
  Prefer answers supported by clear logic and agreement across trajectories. 
  Ignore trajectories with obvious mistakes.

  Choose the most likely correct option.

  Output format (must follow exactly):

  <think>
  {your_thought_here}
  </think>
  <answer>
  {your_answer_here}
  </answer>

judege_user_template: |-
  Question:
  {{ data["question"] }}

  Choices:
  {% for c in data["choices"] %}
  {{ c }}
  {% endfor %}

  Below are {{ times }} reasoning trajectories.

  {% for t in range(times) %}
  Trajectory {{ t }}:
  {{ responses[t] }}

  {% endfor %}

  Compare and contrast these trajectories and decide the final answer.
  Output format (must follow exactly):

  <think>
  {your_thought_here}
  </think>
  <answer>
  {your_answer_here}
  </answer>

user_template_with_memory: |-
  Below are some memory items that I accumulated from past interaction from the environment
  that may be helpful to solve the task.You can use it when you feel it is relevant.In each step,
  please first explicitly discuss if you want to use each memory item or not,and then take action.
  {{memory}}

choice_prompts: 
  best_of_n: |-
    You are an expert in evaluating cyber security agent trajectories. 
    You will be given a question, and candidate trajectories, each representing a kind of thought and reasoning for solving the same task. 
    Your job is to select the single best trajectory that most effectively and efficiently solves the task.  

    ### Agent Trajectories:
    {% for response in responses %}
    [Trajectory {{ loop.index0 }}]
    {{ response }}
    ---
    {% endfor %}

    ## Evaluation Criteria:  
    ### Progress Toward Goal 1. How well the trajectory advances toward completing the user's task. 2. Reward tangible, meaningful progress; penalize 
    minimal or no advancement. 3. Consider both individual step contributions and overall progress.  
    ### Trajectory Efficiency 1. How efficiently the trajectory achieves progress given the number and complexity of steps. 2. Reward significant progress 
    in fewer steps. 3. Favor better value-to-depth ratios. 4. Reward efficient search space exploration.  
    ### Loop Detection: Identify loops or redundant actions. 1. Real Loops: Repeating identical observations and actions with no added value. 2. Benign 
    Repetitions: Slight variations that still yield new information. 3. Penalize real loops heavily; penalize benign repetitions only if they waste effort.  
    ### Error Severity and Stability: Assess severity of errors: 1. Fatal/Blocking: Major penalty. 2. Significant: Moderate penalty. 3. Minor/Recoverable: 
    Minor penalty. 4. Penalize unstable or incoherent model reasoning. 5. Consider whether errors prevent goal completion.  
    ### Overall Trajectory Quality 1. Logical flow of steps, clarity of strategy, and coherence. 2. Balanced exploration vs. exploitation. 3. Closeness to final 
    goal. 4. Reward consistent progress and coherent planning.  
    
    Your response must strictly follow this format:

    <goodcase>
    {index of the good case}
    </goodcase>


    Note: The index is an integer starting from 0, corresponding to the trajectories listed above.

  two_different_trajs: |-
    You are an expert cybersecurity analyst specialized in evaluating the trajectories of autonomous agents. 

    Below are the execution trajectories generated by an agent attempting to solve a security challenge:

    ### Agent Trajectories:
    {% for response in responses %}
    [Trajectory {{ loop.index0 }}]
    {{ response }}
    ---
    {% endfor %}

    ### Task:
    You must analyze the trajectories provided above. Notice that the answers and logical paths within these trajectories vary. 
    Just before,you have analyze these trajectories and provide a correct answer.

    1. Identify one **goodcase**: A trajectory where the agent demonstrates clear, logical thinking and reaches the correct conclusion.
    2. Identify one **badcase**: A trajectory where the agent fails, provides an incorrect answer(sometimes do not provide parseable answer), or follows a flawed logic path.
    3. The agent output format should be:
    <think>
    {your_thought_here}
    </think>
    <answer>
    {your_answer_here}
    </answer>
    ### Output Format:
    Your response must strictly follow this format:

    <goodcase>
    {index of the good case}
    </goodcase>

    <badcase>
    {index of the bad case}
    </badcase>

    Note: The index is an integer starting from 0, corresponding to the trajectories listed above.
