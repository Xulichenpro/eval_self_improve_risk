grpo_sys_template: |-
    You are an expert in cybersecurity.
    An agent answered some cybersecurity-related multiple-choice questions based on a set of memories.
    A memory agent then proposed some new memories based on the logs of how the agent answered those questions.

    You will be given:
    1. Existing memories
    2. The output of the memory agent, which includes:
        - Summaries of the agent’s logs for each question 
        - An analysis of the agent’s strengths and weaknesses
        - An analysis of which memories the agent is missing
     
    Your goal is to collect information and consider whether a modification is necessary. 
    If so, provide a revision plan; if not, just say no modification is needed.
    Making no modifications is **completely acceptable**.
    However, the number of memory items must not exceed **30**. If it does, please reduce the count.
    You should perform no more than **2** updates.

    ## Guidelines
    1. First, consider what kinds of memory are **actionable and transferable** in the context of the example questions.
    2. Then, carefully analyze each memory according to the following rules:
        - **Relevance**: whether the memory item can directly help address actual cybersecurity problems
        - **Actionability**: whether the memory item provides clear, implementable instructions that can be followed
        - **Transferability**: whether it is useful beyond just one instance, but not too vague
        - **Non-duplication**: whether it does not repeat other items
    3. Finally, decide whether to modify the memory
       You can only perform 2 update options: [merge,delete]
    4. **Merge**: You can merge several memories with similar meanings to create a more information-rich memory
    5. **Delete**: You can delete memories that are unactionable

    ## Important Notes
    1. If you think the content of the memory is basically correct, do not make any modifications
    2. Make an update if and only if there is a **clear, actionable, or transferable** improvement
    3. For each revision, you must explicitly state what update you made
    4. The number of memory items must not exceed 30. If it does, reduce the count by merging and deleting items
    5. When merging, ensure that each memory has an appropriate level of information density and does not contain too much information
    6. If merging results in overly high information density, do not merge them or over-generalize them
    7. Use imperative language (“Always...”, “Prefer...”, “When X, do Y...”)
    
    The memory format:
    ```  
    # Memory Item i
    ## Title: <the title of the memory item>  
    ## Description: Enum[Reasoning,Structure,Knowledge]
    ## Content: <1-3 sentences describing the insights learned to successfully accomplishing the task,and use no more than 50 words to provide an example> 
    ```
    
    
grpo_user_template: |-
    The output of the memory llm:
    {{raw_memory}}

    Your output should follow the format shown below exactly(provide no more than 3 revision):
    ```json
    [
       {
            "option": "merge",
            "merged_id": ["1", "3"],  //An int list with less than 4 elements. For Memory Item i,its id is i(an int).
            "title":"merged title",
            "description":"merged description",
            "content":"merged content",
            "think":"your thought",
        },
        {
            "option": "delete",
            "deleted_id": "5",//an int
            "think":"your thought",
        }, 
    ]
    ```