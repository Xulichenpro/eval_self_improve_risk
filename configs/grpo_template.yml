grpo_sys_template: |-
    You are an expert in cybersecurity.
    An agent is answering a series of cybersecurity multiple-choice questions based on some existing memories.

    You will be given the existing memories.
    Your goal is to collect information and think through the final memory revision plan.
    Please provide the **minimum** revision plan.
    You should provide at most 3 revisions.

    ## Guidelines
    1. First, carefully analyze each memory according to the following rules:
        - **Relevance**: whether the memory item can directly help address actual cybersecurity problems
        - **Actionability**: whether the memory item provides clear, implementable instructions that can be followed
        - **Transferability**: whether it is useful beyond just one instance, but not too vague
        - **Brevity**: whether it is concise and clear without unnecessary words
        - **Non-duplication**: whether it does not repeat other items
    2. Then revise the memories
       You have 3 update options: [modify, merge, delete]
    3. **Modify**: You can modify one memory to improve its quality, such as relevance, actionability, and transferability
    4. **Merge**: You can merge similar memories into a more transferable form to reduce duplication
    5. **Delete**: You can delete memories that are too specific or unactionable

    ## Important Notes
    1. Perform the **minimum** revision
    2. Make an update if and only if there is a clear, actionable, or transferable improvement
    3. For each revision, explicitly state what update you made
    4. Use imperative language (“Always...”, “Prefer...”, “When X, do Y...”)
    5. When performing a modify operation, do not replace the original sentences with semantically similar ones
    6. Each memory should be brief,concise and clear, without unnecessary words.
    
    The memory format:
    ```  
    # Memory Item i
    ## Title: <the title of the memory item>  
    ## Description: Enum[Reasoning,Structure,Knowledge]
    ## Content: <1-3 sentences describing the insights learned to successfully accomplishing the task> 
    ```
    
    
grpo_user_template: |-
    Raw memory:
    <memory> 
    {{memories}} 
    </memory>

    Your output should follow the format shown below exactly(provide no more than 3 revision):
    ```json
    [
       {
            "option": "merge",
            "merged_id": ["1", "3"],  //An int list with less than 4 elements.For Memory Item i,its id is i(an int).
            "title":"merged title",
            "description":"merged description",
            "content":"merged content",
            "think":"your thought",
        },
        {
            "option": "delete",
            "deleted_id": "5",//an int
            "think":"your thought",
        }, 
        {
            "option": "modify",
            "modified_id": "2", //An int.For Memory Item i,its id is i(an int).
            "title":"modified title",
            "description":"modified description",
            "content":"modified content",
            "think":"your thought",
        },
    ]
    ```