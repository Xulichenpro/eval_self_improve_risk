<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Memory & Eval Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>,
      X: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>,
      Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>,
      Database: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>,
      Cpu: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>,
      ChevronDown: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>,
      ChevronRight: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>,
      Brain: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>,
      Terminal: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
    };

    const fallbackData = {
      summary: { model: "Demo-Model", temperature: 0.7, benchmark: "Security-Eval", correct_num: 42, false_num: 8, parse_error_num: 2, total_questions: 52 },
      prompts: { "Reasoning_Template": "Analyze the following question step by step...", "Grading_Criteria": "Score 1 if the core logic matches, else 0." },
      batches: [{ id: 1, sub_benchmark: "Java Deserialization", range: "1-10", questions: [], memory: {} }]
    };

    const StatCard = ({ icon: Icon, title, value, colorClass }) => (
      <div className="bg-white rounded-xl shadow-sm p-5 flex items-center space-x-4 border border-slate-200 hover:shadow-md transition-shadow">
        <div className={`p-3 rounded-xl ${colorClass}`}><Icon /></div>
        <div>
          <p className="text-sm text-slate-500 font-semibold uppercase tracking-wide">{title}</p>
          <p className="text-3xl font-black text-slate-800">{value}</p>
        </div>
      </div>
    );

    const QuestionCard = ({ question }) => {
      const [isOpen, setIsOpen] = useState(false);
      return (
        <div className={`border rounded-xl p-5 mb-4 transition-all shadow-sm ${question.is_good ? 'border-green-300 bg-green-50/50' : 'border-red-300 bg-red-50/50'}`}>
          <div className="flex justify-between items-start cursor-pointer group" onClick={() => setIsOpen(!isOpen)}>
            <div className="flex-1 pr-4">
              <div className="flex items-center space-x-2 mb-2">
                <span className={`px-3 py-1 rounded-full text-xs font-black tracking-wider ${question.is_good ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                  {question.is_good ? '✅ GOOD CASE' : '❌ BAD CASE'} #{question.id}
                </span>
              </div>
              <h4 className="font-semibold text-slate-800 text-lg leading-relaxed">{question.question || '暂无题目'}</h4>
            </div>
            <button className="p-2 bg-white rounded-full shadow-sm group-hover:bg-slate-100 border border-slate-200 transition-colors">
              {isOpen ? <Icons.ChevronDown /> : <Icons.ChevronRight />}
            </button>
          </div>
          {isOpen && (
            <div className="mt-5 pt-5 border-t border-slate-200/60 space-y-5">
              <div>
                <h5 className="text-sm font-bold text-slate-500 uppercase mb-2">Options</h5>
                <div className="grid gap-2">
                  {(question.options || []).map((opt, i) => (
                    <div key={i} className="p-3 bg-white rounded-lg border border-slate-200 text-slate-700 text-sm shadow-sm">{opt}</div>
                  ))}
                </div>
              </div>
              <div>
                <h5 className="text-sm font-bold text-slate-500 uppercase mb-2">Agent Trajectories</h5>
                <div className="space-y-2">
                  {(question.trajectories || []).map((traj, i) => (
                    <div key={i} className="p-4 bg-slate-800 text-emerald-400 rounded-lg text-sm font-mono whitespace-pre-wrap shadow-inner leading-relaxed overflow-x-auto">
                      {traj}
                    </div>
                  ))}
                </div>
              </div>
              <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-lg shadow-sm">
                <h5 className="text-sm font-bold text-indigo-800 uppercase mb-1">Judge Verdict</h5>
                <p className="text-sm text-indigo-900 font-medium">{question.judge || '暂无评判结果'}</p>
              </div>
            </div>
          )}
        </div>
      );
    };

    const App = () => {
      const [appData, setAppData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('batches');
      const [selectedBatchId, setSelectedBatchId] = useState(0);

      useEffect(() => {
        fetch('result.json')
          .then(res => res.json())
          .then(data => {
            setAppData(data);
            if(data.batches?.length > 0) setSelectedBatchId(data.batches[0].id);
            setLoading(false);
          })
          .catch(err => {
            setAppData(fallbackData);
            setLoading(false);
          });
      }, []);

      if (loading) return <div className="min-h-screen flex items-center justify-center text-slate-500 text-xl font-bold italic tracking-widest animate-pulse">LOADING EXPERIMENT DATA...</div>;

      const selectedBatch = appData.batches.find(b => b.id === selectedBatchId);
      const memory = selectedBatch?.memory || {};

      return (
        <div className="p-4 md:p-8 max-w-[1600px] mx-auto space-y-6">
          <div className="bg-white rounded-2xl shadow-sm p-6 md:p-8 border border-slate-200">
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
              <div>
                <h1 className="text-3xl font-black text-slate-800 flex items-center gap-3">
                  <span className="bg-indigo-600 text-white p-2 rounded-xl shadow-lg shadow-indigo-200"><Icons.Brain /></span>
                  LLM Reasoning & Memory Eval
                </h1>
                <p className="text-slate-500 mt-2 text-lg italic">
                  Benchmark: <span className="font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">{appData.summary.benchmark}</span>
                </p>
              </div>
              <div className="flex items-center space-x-2 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-xl shadow-slate-200">
                <Icons.Cpu />
                <span className="font-mono text-sm tracking-tight">MODEL: {appData.summary.model} | TEMP: {appData.summary.temperature}</span>
              </div>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
              <StatCard icon={Icons.Check} title="Correct" value={appData.summary.correct_num} colorClass="bg-green-100 text-green-600" />
              <StatCard icon={Icons.X} title="False" value={appData.summary.false_num} colorClass="bg-red-100 text-red-600" />
              <StatCard icon={Icons.Alert} title="Parse Errors" value={appData.summary.parse_error_num} colorClass="bg-amber-100 text-amber-600" />
              <StatCard icon={Icons.Database} title="Total Processed" value={appData.summary.total_questions} colorClass="bg-blue-100 text-blue-600" />
            </div>
          </div>

          <div className="flex space-x-2 border-b border-slate-300 px-2 relative z-10">
            <button 
              onClick={() => setActiveTab('batches')}
              className={`px-8 py-4 font-bold rounded-t-xl transition-all duration-300 ${activeTab === 'batches' ? 'bg-white text-indigo-700 border-t-4 border-indigo-600 shadow-[0_-4px_10px_-2px_rgba(0,0,0,0.1)]' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}`}
            >
              Batch Eval & Memory
            </button>
            <button 
              onClick={() => setActiveTab('prompts')}
              className={`px-8 py-4 font-bold rounded-t-xl transition-all duration-300 ${activeTab === 'prompts' ? 'bg-white text-indigo-700 border-t-4 border-indigo-600 shadow-[0_-4px_10px_-2px_rgba(0,0,0,0.1)]' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}`}
            >
              Prompts
            </button>
          </div>

          <div className="bg-white rounded-b-2xl rounded-tr-2xl shadow-xl border border-slate-200 min-h-[700px] overflow-hidden">
            {activeTab === 'prompts' && (
              <div className="p-8 space-y-8 animate-in fade-in duration-500">
                <div className="flex items-center gap-3 mb-4">
                  <div className="p-2 bg-indigo-100 text-indigo-600 rounded-lg"><Icons.Terminal /></div>
                  <h2 className="text-2xl font-black text-slate-800">Prompt Templates</h2>
                </div>
                {Object.entries(appData.prompts || {}).map(([key, value]) => (
                  <div key={key} className="group border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                    <div className="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                      <span className="font-black text-slate-600 font-mono text-sm tracking-widest">{key.toUpperCase()}</span>
                      <span className="text-xs text-slate-400 font-medium">Read Only</span>
                    </div>
                    <pre className="bg-slate-900 text-slate-300 p-6 font-mono text-sm whitespace-pre-wrap overflow-x-auto leading-relaxed border-t border-slate-800">
                      <code className="text-indigo-300">{value}</code>
                    </pre>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'batches' && (
              <div className="flex flex-col lg:flex-row h-full">
                <div className="w-full lg:w-1/4 border-r border-slate-200 bg-slate-50/50 p-4 h-[800px] overflow-y-auto">
                  <h3 className="font-black text-slate-400 uppercase tracking-[0.2em] text-[10px] mb-4 ml-2">Pipeline History</h3>
                  <div className="space-y-3">
                    {appData.batches.map(batch => (
                      <button
                        key={batch.id} onClick={() => setSelectedBatchId(batch.id)}
                        className={`w-full text-left p-5 rounded-2xl border-2 transition-all duration-300 ${selectedBatchId === batch.id ? 'bg-white border-indigo-500 shadow-lg ring-4 ring-indigo-50' : 'bg-white border-transparent hover:border-slate-200 shadow-sm opacity-70 hover:opacity-100'}`}
                      >
                        <div className="flex justify-between items-center mb-2">
                          <span className={`font-black text-lg ${selectedBatchId === batch.id ? 'text-indigo-700' : 'text-slate-700'}`}>Batch #{batch.id}</span>
                          <span className="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded border border-slate-200 italic">{batch.range}</span>
                        </div>
                        <p className="text-xs font-bold text-slate-500 truncate uppercase tracking-tighter">{batch.sub_benchmark}</p>
                      </button>
                    ))}
                  </div>
                </div>

                {selectedBatch && (
                  <div className="w-full lg:w-3/4 p-6 lg:p-10 h-[800px] overflow-y-auto bg-white relative animate-in slide-in-from-right-4 duration-500">
                    <section className="mb-12">
                      <h3 className="text-xl font-black mb-8 text-slate-800 flex items-center border-b-2 pb-4 border-slate-100">
                        <span className="text-2xl mr-3">🧠</span> MEMORY EVOLUTION
                      </h3>
                      <div className="space-y-6">
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                          <div className="bg-white rounded-2xl p-6 border border-green-200 shadow-sm relative overflow-hidden group hover:shadow-green-100 transition-all">
                            <div className="absolute top-0 left-0 w-1.5 h-full bg-green-500"></div>
                            <h4 className="text-green-700 font-black uppercase tracking-widest text-xs mb-4 flex items-center">
                              <Icons.Check /> <span className="ml-2">Raw Success Insight</span>
                            </h4>
                            <div className="bg-green-50/30 rounded-xl p-4 text-sm text-green-900 font-mono whitespace-pre-wrap leading-relaxed max-h-[200px] overflow-y-auto border border-green-100">
                              {memory.raw_success || "None recorded."}
                            </div>
                          </div>
                          <div className="bg-white rounded-2xl p-6 border border-red-200 shadow-sm relative overflow-hidden group hover:shadow-red-100 transition-all">
                            <div className="absolute top-0 left-0 w-1.5 h-full bg-red-500"></div>
                            <h4 className="text-red-700 font-black uppercase tracking-widest text-xs mb-4 flex items-center">
                              <Icons.X /> <span className="ml-2">Raw Failure Insight</span>
                            </h4>
                            <div className="bg-red-50/30 rounded-xl p-4 text-sm text-red-900 font-mono whitespace-pre-wrap leading-relaxed max-h-[200px] overflow-y-auto border border-red-100">
                              {memory.raw_fail || "None recorded."}
                            </div>
                          </div>
                        </div>
                        <div className="bg-slate-900 rounded-2xl p-6 shadow-2xl relative overflow-hidden">
                          <div className="absolute top-0 right-0 p-4 opacity-10 text-white"><Icons.Brain /></div>
                          <h4 className="text-indigo-400 font-black uppercase tracking-widest text-xs mb-4">🤖 LLM Optimizer Output</h4>
                          <div className="bg-slate-950/50 rounded-xl p-5 text-sm text-indigo-100 font-mono whitespace-pre-wrap leading-relaxed max-h-[300px] overflow-y-auto border border-slate-800">
                            {memory.response_opt_memory || "Optimization step skipped."}
                          </div>
                        </div>
                        <div className="bg-gradient-to-br from-indigo-600 to-blue-700 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                          <h4 className="text-white font-black uppercase tracking-widest text-xs mb-4 flex items-center opacity-90">
                            <Icons.Database /> <span className="ml-2">Updated Global Memory (v2.0)</span>
                          </h4>
                          <div className="bg-white/10 backdrop-blur-md rounded-xl p-5 text-sm text-white font-mono whitespace-pre-wrap leading-relaxed max-h-[400px] overflow-y-auto border border-white/20">
                            {memory.updated_global_memory || "Standby for memory sync..."}
                          </div>
                        </div>
                      </div>
                    </section>
                    <section>
                      <h3 className="text-xl font-black mb-8 text-slate-800 flex items-center border-b-2 pb-4 border-slate-100">
                        <span className="text-2xl mr-3">📝</span> EVALUATED QUESTIONS
                      </h3>
                      <div className="space-y-4">
                        {(selectedBatch.questions || []).length > 0 ? (
                          selectedBatch.questions.map(q => <QuestionCard key={q.id} question={q} />)
                        ) : (
                          <div className="text-center py-20 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200 text-slate-400 font-bold italic">
                            No telemetry available for this specific batch.
                          </div>
                        )}
                      </div>
                    </section>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
